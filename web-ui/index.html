<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RepoSync Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <style>
        @keyframes splash-pulse {
          0%, 100% { opacity: 1; transform: scale(1); }
          50% { opacity: 0.7; transform: scale(0.98); }
        }
        @keyframes splash-spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
        @keyframes splash-glow {
          0%, 100% { filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.3)); }
          50% { filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.6)); }
        }
        @keyframes splash-fade-in {
          0% { opacity: 0; transform: translateY(10px); }
          100% { opacity: 1; transform: translateY(0); }
        }
        .splash-container {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          background: radial-gradient(ellipse at center, #1a2332 0%, #111827 70%);
          font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
          gap: 20px;
        }
        .splash-logo {
          display: flex;
          align-items: center;
          gap: 16px;
          animation: splash-fade-in 0.6s ease-out;
        }
        .splash-icon {
          width: 56px;
          height: 56px;
          animation: splash-glow 2.5s ease-in-out infinite;
        }
        .splash-title {
          font-family: 'Orbitron', sans-serif;
          font-size: 2.4rem;
          font-weight: 700;
          color: #f3f4f6;
          letter-spacing: 0.08em;
          animation: splash-pulse 2.5s ease-in-out infinite;
        }
        .splash-subtitle {
          font-family: 'Orbitron', sans-serif;
          font-size: 0.75rem;
          font-weight: 500;
          color: #6b7280;
          letter-spacing: 0.2em;
          text-transform: uppercase;
          animation: splash-fade-in 0.8s ease-out 0.2s both;
        }
        .splash-spinner {
          width: 28px;
          height: 28px;
          border: 3px solid #1f2937;
          border-top-color: #3b82f6;
          border-right-color: #818cf8;
          border-radius: 50%;
          animation: splash-spin 0.8s linear infinite, splash-fade-in 0.8s ease-out 0.4s both;
        }
      </style>
      <div class="splash-container">
        <div class="splash-logo">
          <svg class="splash-icon" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="logoGrad" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#3b82f6"/>
                <stop offset="100%" stop-color="#818cf8"/>
              </linearGradient>
              <linearGradient id="arrowGrad" x1="10" y1="10" x2="46" y2="46" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#60a5fa"/>
                <stop offset="100%" stop-color="#a78bfa"/>
              </linearGradient>
            </defs>
            <!-- Outer ring -->
            <circle cx="28" cy="28" r="25" stroke="url(#logoGrad)" stroke-width="2" fill="none" opacity="0.3"/>
            <!-- Top sync arrow (clockwise) -->
            <path d="M 38 14 A 16 16 0 0 1 42 28" stroke="url(#arrowGrad)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <polygon points="43,27 42,31 39,28" fill="#60a5fa"/>
            <!-- Bottom sync arrow (counter-clockwise) -->
            <path d="M 18 42 A 16 16 0 0 1 14 28" stroke="url(#arrowGrad)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <polygon points="13,29 14,25 17,28" fill="#a78bfa"/>
            <!-- Center branching node -->
            <circle cx="28" cy="28" r="5" fill="#1e293b" stroke="url(#logoGrad)" stroke-width="2"/>
            <circle cx="28" cy="28" r="2" fill="#60a5fa"/>
            <!-- Branch lines -->
            <line x1="28" y1="23" x2="28" y2="14" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
            <line x1="28" y1="33" x2="28" y2="42" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
            <line x1="23" y1="28" x2="14" y2="28" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
            <line x1="33" y1="28" x2="42" y2="28" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
            <!-- Small endpoint nodes -->
            <circle cx="28" cy="13" r="2" fill="#3b82f6"/>
            <circle cx="28" cy="43" r="2" fill="#818cf8"/>
          </svg>
          <span class="splash-title">RepoSync</span>
        </div>
        <span class="splash-subtitle">Repository Synchronization Platform</span>
        <div class="splash-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
