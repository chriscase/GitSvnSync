<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitSvnSync Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <style>
        @keyframes splash-pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.5; }
        }
        @keyframes splash-spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
        .splash-container {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          background: #111827;
          font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
          gap: 24px;
        }
        .splash-logo {
          display: flex;
          align-items: center;
          gap: 14px;
        }
        .splash-icon {
          width: 48px;
          height: 48px;
          animation: splash-pulse 2s ease-in-out infinite;
        }
        .splash-title {
          font-size: 2rem;
          font-weight: 700;
          color: #f3f4f6;
          letter-spacing: -0.025em;
          animation: splash-pulse 2s ease-in-out infinite;
        }
        .splash-subtitle {
          font-size: 0.875rem;
          font-weight: 500;
          color: #6b7280;
          letter-spacing: 0.05em;
          text-transform: uppercase;
        }
        .splash-spinner {
          width: 24px;
          height: 24px;
          border: 3px solid #1f2937;
          border-top-color: #3b82f6;
          border-radius: 50%;
          animation: splash-spin 0.8s linear infinite;
        }
      </style>
      <div class="splash-container">
        <div class="splash-logo">
          <svg class="splash-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="2" width="44" height="44" rx="10" stroke="#3b82f6" stroke-width="2.5" fill="#1e3a5f"/>
            <path d="M14 24 L22 32 L34 16" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <circle cx="14" cy="16" r="3" fill="#818cf8"/>
            <circle cx="34" cy="32" r="3" fill="#818cf8"/>
            <line x1="14" y1="19" x2="14" y2="24" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
            <line x1="34" y1="29" x2="34" y2="24" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-dasharray="2 3"/>
          </svg>
          <span class="splash-title">GitSvnSync</span>
        </div>
        <span class="splash-subtitle">Sync Dashboard</span>
        <div class="splash-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
